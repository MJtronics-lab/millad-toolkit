<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Millads Toolkit</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1419">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1419;
    color: #e8e8e8;
    min-height: 100vh;
    padding: 20px;
  }
  .container {
    max-width: 400px;
    width: 100%;
    margin: 0 auto;
    text-align: center;
  }
  .logo {
    width: 80px; height: 80px; margin: 0 auto 20px;
    background: linear-gradient(135deg, #4a90e2, #50c878);
    border-radius: 20px; display: flex; align-items: center; justify-content: center;
    font-size: 36px; font-weight: 700; color: #fff; letter-spacing: -2px;
  }
  h1 { font-size: 26px; color: #fff; margin-bottom: 6px; }
  .subtitle { color: #8a96a3; font-size: 14px; margin-bottom: 20px; }

  /* Streak Counter */
  .streak-card {
    background: #1a2230;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .streak-card::before {
    content: "";
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(135deg, #f5a62308, #e2729a08);
    pointer-events: none;
  }
  .streak-number {
    font-size: 56px;
    font-weight: 800;
    color: #fff;
    line-height: 1;
    margin-bottom: 4px;
  }
  .streak-number.zero { color: #4a5668; }
  .streak-number.fire { color: #f5a623; }
  .streak-label {
    font-size: 14px;
    color: #8a96a3;
  }
  .streak-label strong { color: #f5a623; }
  .streak-sub {
    font-size: 12px;
    color: #5a6878;
    margin-top: 4px;
  }

  /* Morning Banner */
  .morning-card {
    background: linear-gradient(135deg, #0f1a2e, #1a1030);
    border: 1px solid #9b6dd744;
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 16px;
    text-align: left;
  }
  .morning-penalty {
    background: linear-gradient(135deg, #2e0a0a, #1a1030);
    border-color: #e2729a44;
    margin-bottom: 12px;
    padding: 16px 18px;
    border-radius: 12px;
  }
  .morning-penalty-title {
    font-size: 15px; font-weight: 700; color: #e2729a; margin-bottom: 4px;
    display: flex; align-items: center; gap: 8px;
  }
  .morning-penalty-text { font-size: 13px; color: #c5cdd6; }
  .morning-penalty-dismiss {
    background: none; border: 1px solid #3a4a5e; color: #8a96a3;
    padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer;
    margin-top: 8px;
  }
  .verse-ar {
    font-size: 18px;
    color: #c5cdd6;
    line-height: 1.8;
    text-align: right;
    direction: rtl;
    margin-bottom: 8px;
    font-family: 'Traditional Arabic', 'Scheherazade', serif;
  }
  .verse-de {
    font-size: 14px; color: #8a96a3; line-height: 1.5;
    margin-bottom: 6px; font-style: italic;
  }
  .verse-ref {
    font-size: 12px; color: #5a6878;
  }

  /* Friday Review */
  .friday-card {
    background: linear-gradient(135deg, #1a2230, #0f1a2e);
    border: 1px solid #50c87844;
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 16px;
    text-align: left;
  }
  .friday-title {
    font-size: 16px; font-weight: 700; color: #50c878; margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .friday-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0; border-bottom: 1px solid #2a344533;
    font-size: 14px;
  }
  .friday-row:last-child { border-bottom: none; }
  .friday-label { color: #8a96a3; }
  .friday-value { color: #fff; font-weight: 600; }
  .friday-value.good { color: #50c878; }
  .friday-value.warn { color: #f5a623; }
  .friday-value.bad { color: #e2729a; }
  .friday-trend { font-size: 12px; margin-left: 6px; }

  /* Nav Buttons */
  .btn {
    display: flex; align-items: center; gap: 16px; width: 100%;
    background: #1a2230; border: none; border-radius: 14px;
    padding: 20px 22px; margin-bottom: 14px;
    cursor: pointer; text-decoration: none;
    transition: background 0.15s, transform 0.15s;
  }
  .btn:active { background: #232d3d; transform: scale(0.98); }
  .btn-icon {
    width: 48px; height: 48px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  .btn-icon.plan { background: linear-gradient(135deg, #f5a623, #e2729a); }
  .btn-icon.check { background: linear-gradient(135deg, #50c878, #4a90e2); }
  .btn-icon.stats { background: linear-gradient(135deg, #4a90e2, #9b6dd7); }
  .btn-icon.bell { background: linear-gradient(135deg, #9b6dd7, #4a90e2); }
  .btn-text { text-align: left; }
  .btn-title { font-size: 17px; font-weight: 600; color: #fff; margin-bottom: 3px; }
  .btn-desc { font-size: 13px; color: #8a96a3; }
  .btn-arrow { margin-left: auto; color: #4a5668; font-size: 20px; }

  .footer { margin-top: 30px; color: #3a4a5e; font-size: 12px; text-align: center; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">M</div>
  <h1>Millads Toolkit</h1>
  <p class="subtitle" id="greeting"></p>

  <!-- Morning: Penalty Reminder -->
  <div id="morning-area"></div>

  <!-- Streak Counter -->
  <div class="streak-card" id="streak-card">
    <div class="streak-number" id="streak-num">0</div>
    <div class="streak-label" id="streak-label">Tage Streak</div>
    <div class="streak-sub" id="streak-sub">Alle Kern-Regeln eingehalten</div>
  </div>

  <!-- Morning: Daily Wisdom -->
  <div id="wisdom-area"></div>

  <!-- Friday Review -->
  <div id="friday-area"></div>

  <a href="tagesplan.html" class="btn">
    <div class="btn-icon plan">&#9776;</div>
    <div class="btn-text">
      <div class="btn-title">Tagesplan</div>
      <div class="btn-desc">Tagesstruktur von Fajr bis Schlaf</div>
    </div>
    <div class="btn-arrow">&#8250;</div>
  </a>

  <a href="checkliste.html" class="btn">
    <div class="btn-icon check">&#10003;</div>
    <div class="btn-text">
      <div class="btn-title">Checkliste</div>
      <div class="btn-desc" id="checklist-desc">24 Regeln abhaken, Fortschritt tracken</div>
    </div>
    <div class="btn-arrow">&#8250;</div>
  </a>

  <a href="statistik.html" class="btn">
    <div class="btn-icon stats">&#128202;</div>
    <div class="btn-text">
      <div class="btn-title">Statistik</div>
      <div class="btn-desc">Wochen-Auswertung & Schwachstellen</div>
    </div>
    <div class="btn-arrow">&#8250;</div>
  </a>

  <a href="erinnerungen.html" class="btn">
    <div class="btn-icon bell">&#128276;</div>
    <div class="btn-text">
      <div class="btn-title">Erinnerungen</div>
      <div class="btn-desc">6 Push-Reminder konfigurieren</div>
    </div>
    <div class="btn-arrow">&#8250;</div>
  </a>

  <p class="footer">PWA &middot; Offline-fähig &middot; Installierbar</p>
</div>

<script src="shared.js"></script>
<script>
  // Night lock
  checkNightLock();

  // Greeting
  const hour = new Date().getHours();
  let greet = 'Guten Abend';
  if (hour >= 4 && hour < 12) greet = 'Guten Morgen';
  else if (hour >= 12 && hour < 17) greet = 'Guten Tag';
  else if (hour >= 17 && hour < 21) greet = 'Guten Abend';
  document.getElementById('greeting').textContent = greet + ' — Bismillah';

  // Streak
  const streak = calculateStreak();
  const streakEl = document.getElementById('streak-num');
  streakEl.textContent = streak;
  if (streak === 0) {
    streakEl.className = 'streak-number zero';
    document.getElementById('streak-label').textContent = 'Noch kein Streak';
    document.getElementById('streak-sub').textContent = 'Schließe heute alle Kern-Regeln ab';
  } else {
    streakEl.className = 'streak-number fire';
    streakEl.textContent = '🔥 ' + streak;
    document.getElementById('streak-label').innerHTML = streak === 1
      ? 'Tag <strong>Kern-Streak</strong>'
      : 'Tage <strong>Kern-Streak</strong>';
  }

  // Today's checklist progress hint
  const todayResult = analyzeDayResult(dateISO(new Date()));
  if (todayResult && todayResult.done > 0) {
    document.getElementById('checklist-desc').textContent =
      `Heute: ${todayResult.done}/${todayResult.total} erledigt (${todayResult.pct}%)`;
  }

  // Morning screen (4:00–10:00): penalty + wisdom
  if (hour >= 4 && hour < 10) {
    // Penalty reminder
    const morningArea = document.getElementById('morning-area');
    try {
      const raw = localStorage.getItem('penalty_tomorrow');
      if (raw) {
        const p = JSON.parse(raw);
        const todayISO = dateISO(new Date());
        if (p.date === todayISO && !sessionStorage.getItem('penalty_morning_dismissed')) {
          morningArea.innerHTML = `
            <div class="morning-penalty">
              <div class="morning-penalty-title">⚡ Strafe von gestern</div>
              <div class="morning-penalty-text">
                <strong style="color:#fff;">${p.level === 'voll' ? '30 Min früher aufstehen + kalte Dusche' : 'Kalte Dusche'}</strong>
              </div>
              <button class="morning-penalty-dismiss" id="dismiss-penalty">Erledigt ✓</button>
            </div>
          `;
          document.getElementById('dismiss-penalty').addEventListener('click', () => {
            morningArea.innerHTML = '';
            sessionStorage.setItem('penalty_morning_dismissed', '1');
            localStorage.removeItem('penalty_tomorrow');
          });
        }
      }
    } catch(e) {}

    // Daily wisdom
    const wisdom = getDailyWisdom();
    const wisdomArea = document.getElementById('wisdom-area');
    wisdomArea.innerHTML = `
      <div class="morning-card">
        ${wisdom.ar ? '<div class="verse-ar">' + wisdom.ar + '</div>' : ''}
        <div class="verse-de">${wisdom.de}</div>
        <div class="verse-ref">— ${wisdom.ref}</div>
      </div>
    `;
  }

  // Friday Review
  if (new Date().getDay() === 5) {
    const thisWeek = getThisWeekPct();
    const lastWeek = getLastWeekPct();
    const penalties = getWeekPenalties();
    const trendDiff = lastWeek !== null ? thisWeek - lastWeek : null;
    let trendStr = '';
    if (trendDiff !== null) {
      if (trendDiff > 0) trendStr = `<span class="friday-trend" style="color:#50c878;">↑ +${trendDiff}%</span>`;
      else if (trendDiff < 0) trendStr = `<span class="friday-trend" style="color:#e2729a;">↓ ${trendDiff}%</span>`;
      else trendStr = `<span class="friday-trend" style="color:#8a96a3;">→ gleich</span>`;
    }

    const pctClass = thisWeek >= 70 ? 'good' : thisWeek >= 40 ? 'warn' : 'bad';
    const penClass = penalties.count === 0 ? 'good' : penalties.count <= 2 ? 'warn' : 'bad';
    const streakClass = streak >= 5 ? 'good' : streak >= 2 ? 'warn' : 'bad';

    document.getElementById('friday-area').innerHTML = `
      <div class="friday-card">
        <div class="friday-title">📊 Wochen-Review (Freitag)</div>
        <div class="friday-row">
          <span class="friday-label">Regeln eingehalten</span>
          <span class="friday-value ${pctClass}">${thisWeek}% ${trendStr}</span>
        </div>
        <div class="friday-row">
          <span class="friday-label">Strafen diese Woche</span>
          <span class="friday-value ${penClass}">${penalties.count}</span>
        </div>
        <div class="friday-row">
          <span class="friday-label">Aktuelle Streak</span>
          <span class="friday-value ${streakClass}">${streak} Tage</span>
        </div>
        <div class="friday-row">
          <span class="friday-label">Trend vs. letzte Woche</span>
          <span class="friday-value">${lastWeek !== null ? lastWeek + '% → ' + thisWeek + '%' : 'Keine Daten'}</span>
        </div>
        <div style="text-align:center; margin-top:12px;">
          <a href="statistik.html" style="color:#4a90e2; font-size:13px; text-decoration:none;">Details in Statistik →</a>
        </div>
      </div>
    `;
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
<script src="notifications.js"></script>
</body>
</html>
