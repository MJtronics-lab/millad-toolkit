<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Millads Toolkit</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1419">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1419;
    color: #e8e8e8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    max-width: 400px;
    width: 100%;
    text-align: center;
  }
  .logo {
    width: 80px;
    height: 80px;
    margin: 0 auto 20px;
    background: linear-gradient(135deg, #4a90e2, #50c878);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -2px;
  }
  h1 {
    font-size: 26px;
    color: #fff;
    margin-bottom: 6px;
  }
  .subtitle {
    color: #8a96a3;
    font-size: 14px;
    margin-bottom: 36px;
  }
  .btn {
    display: flex;
    align-items: center;
    gap: 16px;
    width: 100%;
    background: #1a2230;
    border: none;
    border-radius: 14px;
    padding: 20px 22px;
    margin-bottom: 14px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s, transform 0.15s;
  }
  .btn:active { background: #232d3d; transform: scale(0.98); }
  .btn-icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .btn-icon.plan { background: linear-gradient(135deg, #f5a623, #e2729a); }
  .btn-icon.check { background: linear-gradient(135deg, #50c878, #4a90e2); }
  .btn-text {
    text-align: left;
  }
  .btn-title {
    font-size: 17px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 3px;
  }
  .btn-desc {
    font-size: 13px;
    color: #8a96a3;
  }
  .btn-arrow {
    margin-left: auto;
    color: #4a5668;
    font-size: 20px;
  }
  .footer {
    margin-top: 30px;
    color: #3a4a5e;
    font-size: 12px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="logo">M</div>
  <h1>Millads Toolkit</h1>
  <p class="subtitle">Tagesplan & Checkliste</p>

  <a href="tagesplan.html" class="btn">
    <div class="btn-icon plan">&#9776;</div>
    <div class="btn-text">
      <div class="btn-title">Tagesplan</div>
      <div class="btn-desc">Tagesstruktur von Fajr bis Schlaf</div>
    </div>
    <div class="btn-arrow">&#8250;</div>
  </a>

  <a href="checkliste.html" class="btn">
    <div class="btn-icon check">&#10003;</div>
    <div class="btn-text">
      <div class="btn-title">Checkliste</div>
      <div class="btn-desc">24 Regeln abhaken, Fortschritt tracken</div>
    </div>
    <div class="btn-arrow">&#8250;</div>
  </a>

  <p class="footer">PWA &middot; Offline-fähig &middot; Installierbar</p>
</div>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
