<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Erinnerungen</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1419">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1419;
    color: #e8e8e8;
    padding: 16px;
    line-height: 1.4;
    min-height: 100vh;
  }
  .container { max-width: 500px; margin: 0 auto; }
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: #4a90e2;
    text-decoration: none;
    font-size: 14px;
    margin-bottom: 12px;
  }
  h1 { font-size: 24px; text-align: center; color: #fff; margin-bottom: 6px; }
  .page-desc { text-align: center; color: #8a96a3; font-size: 14px; margin-bottom: 24px; }

  .status-card {
    background: #1a2230;
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .status-icon {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .status-icon.granted { background: linear-gradient(135deg, #50c878, #4a90e2); }
  .status-icon.denied { background: linear-gradient(135deg, #e2729a, #f5a623); }
  .status-icon.default { background: linear-gradient(135deg, #f5a623, #4a90e2); }
  .status-icon.unsupported { background: #3a4a5e; }
  .status-text { flex: 1; }
  .status-title { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 2px; }
  .status-desc { font-size: 13px; color: #8a96a3; }
  .status-btn {
    background: #4a90e2; border: none; color: #fff;
    padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
    cursor: pointer; flex-shrink: 0;
  }
  .status-btn:active { opacity: 0.8; }

  .server-card {
    background: #1a2230;
    border-radius: 12px;
    padding: 14px 18px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .server-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }
  .server-dot.online { background: #50c878; box-shadow: 0 0 6px #50c87888; }
  .server-dot.offline { background: #e2729a; }
  .server-info { flex: 1; }
  .server-label { font-size: 13px; color: #8a96a3; }
  .server-status { font-size: 14px; font-weight: 600; color: #fff; }
  .test-btn {
    background: #9b6dd7; border: none; color: #fff;
    padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 600;
    cursor: pointer; flex-shrink: 0;
  }
  .test-btn:active { opacity: 0.8; }

  .ios-hint {
    background: #2a1a10; border: 1px solid #f5a62355;
    border-radius: 12px; padding: 14px 18px; margin-bottom: 20px;
    font-size: 13px; color: #f5a623; line-height: 1.5;
  }
  .ios-hint strong { display: block; margin-bottom: 4px; font-size: 14px; }

  .section-label {
    font-size: 12px; font-weight: 700; color: #8a96a3;
    letter-spacing: 1px; margin-bottom: 10px; padding-left: 4px;
  }

  .reminder-card {
    background: #1a2230; border-radius: 12px;
    padding: 16px 18px; margin-bottom: 10px; transition: opacity 0.2s;
  }
  .reminder-card.disabled { opacity: 0.5; }
  .reminder-card.sticky-tag {
    border-left: 3px solid #9b6dd7;
  }
  .reminder-top {
    display: flex; align-items: center; gap: 12px; margin-bottom: 8px;
  }
  .reminder-emoji { font-size: 22px; flex-shrink: 0; }
  .reminder-info { flex: 1; }
  .reminder-title { font-size: 15px; font-weight: 600; color: #fff; }
  .reminder-body { font-size: 13px; color: #8a96a3; margin-top: 2px; }
  .reminder-badges {
    display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap;
  }
  .badge {
    font-size: 11px; padding: 2px 6px; border-radius: 4px;
    background: #0f141988; color: #8a96a3;
  }
  .badge.sticky { background: #9b6dd722; color: #9b6dd7; }
  .badge.action { background: #4a90e222; color: #4a90e2; }
  .reminder-bottom {
    display: flex; align-items: center; gap: 12px;
    margin-top: 10px; padding-top: 10px; border-top: 1px solid #2a3445;
  }
  .reminder-day {
    font-size: 12px; color: #9b6dd7;
    background: #9b6dd722; padding: 2px 8px; border-radius: 4px;
  }
  .time-input-wrap { display: flex; align-items: center; gap: 6px; flex: 1; }
  .time-label { font-size: 13px; color: #8a96a3; }
  .time-input {
    background: #0f1419; border: 1px solid #2a3445; color: #e8e8e8;
    padding: 6px 10px; border-radius: 8px; font-size: 14px;
    font-family: inherit; width: 80px; text-align: center;
  }
  .time-input:focus { outline: none; border-color: #4a90e2; }

  .toggle { position: relative; width: 48px; height: 28px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; cursor: pointer;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #3a4a5e; border-radius: 28px; transition: 0.2s;
  }
  .toggle-slider::before {
    content: ""; position: absolute; height: 22px; width: 22px;
    left: 3px; bottom: 3px; background: #fff;
    border-radius: 50%; transition: 0.2s;
  }
  .toggle input:checked + .toggle-slider { background: #50c878; }
  .toggle input:checked + .toggle-slider::before { transform: translateX(20px); }

  .save-toast {
    position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #50c878; color: #0f1419;
    padding: 10px 24px; border-radius: 10px;
    font-size: 14px; font-weight: 600;
    transition: transform 0.3s ease; z-index: 9999;
  }
  .save-toast.show { transform: translateX(-50%) translateY(0); }

  .footer-note {
    text-align: center; color: #5a6878; font-size: 12px;
    margin-top: 20px; padding: 0 20px;
  }

  .loading { text-align: center; color: #8a96a3; padding: 20px; }
</style>
</head>
<body>
<div class="container">
  <a href="index.html" class="back-link">&#8249; Zurück</a>
  <h1>🔔 Erinnerungen</h1>
  <p class="page-desc">Server-Push — auch wenn die App geschlossen ist</p>

  <div id="status-area"></div>
  <div id="server-area"></div>
  <div id="ios-hint-area"></div>

  <div class="section-label">TÄGLICH</div>
  <div id="daily-list"><div class="loading">Lade Einstellungen...</div></div>

  <div class="section-label" style="margin-top: 20px;">WÖCHENTLICH</div>
  <div id="weekly-list"></div>

  <p class="footer-note">
    Push-Server: push.mjtronics.de<br>
    Erinnerungen kommen auch bei geschlossener App (Android/Desktop).<br>
    iOS: App muss vom Homescreen gestartet sein (iOS 16.4+).
  </p>
</div>

<div class="save-toast" id="toast">Gespeichert ✓</div>

<script>
  const PUSH_API = 'https://push.mjtronics.de';

  const REMINDER_META = {
    fruehstueck: { emoji: '💊', section: 'daily' },
    wasser:      { emoji: '💧', section: 'daily' },
    feierabend:  { emoji: '🏃', section: 'daily' },
    winddown:    { emoji: '🌙', section: 'daily' },
    adhkar:      { emoji: '🤲', section: 'daily' },
    wochencheck: { emoji: '📊', section: 'weekly' },
  };

  function pad(n) { return n.toString().padStart(2, '0'); }
  function isIOS() { return /iPad|iPhone|iPod/.test(navigator.userAgent); }
  function isStandalone() {
    return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
  }
  function notificationsSupported() { return 'Notification' in window && 'PushManager' in window; }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg || 'Gespeichert ✓';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  // --- Status card ---
  function renderStatus() {
    const area = document.getElementById('status-area');
    if (!notificationsSupported()) {
      area.innerHTML = `<div class="status-card">
        <div class="status-icon unsupported">✗</div>
        <div class="status-text">
          <div class="status-title">Nicht unterstützt</div>
          <div class="status-desc">Dein Browser unterstützt keine Push-Notifications</div>
        </div></div>`;
      return;
    }

    const perm = Notification.permission;
    if (perm === 'granted') {
      area.innerHTML = `<div class="status-card">
        <div class="status-icon granted">✓</div>
        <div class="status-text">
          <div class="status-title">Push aktiv</div>
          <div class="status-desc">Server-Erinnerungen kommen auch bei geschlossener App</div>
        </div></div>`;
    } else if (perm === 'denied') {
      area.innerHTML = `<div class="status-card">
        <div class="status-icon denied">✗</div>
        <div class="status-text">
          <div class="status-title">Blockiert</div>
          <div class="status-desc">Erlaube Benachrichtigungen in den Browser-Einstellungen</div>
        </div></div>`;
    } else {
      area.innerHTML = `<div class="status-card">
        <div class="status-icon default">?</div>
        <div class="status-text">
          <div class="status-title">Noch nicht aktiviert</div>
          <div class="status-desc">Push aktivieren für Erinnerungen auch ohne offene App</div>
        </div>
        <button class="status-btn" id="perm-btn">Aktivieren</button></div>`;
      document.getElementById('perm-btn').addEventListener('click', async () => {
        const result = await Notification.requestPermission();
        if (result === 'granted') {
          // Subscribe via notifications.js
          if (typeof requestPermissionAndSubscribe === 'function') {
            await requestPermissionAndSubscribe();
          }
        }
        renderStatus();
      });
    }
  }

  // --- Server status ---
  async function renderServerStatus() {
    const area = document.getElementById('server-area');
    try {
      const res = await fetch(PUSH_API + '/health');
      const data = await res.json();
      area.innerHTML = `<div class="server-card">
        <div class="server-dot online"></div>
        <div class="server-info">
          <div class="server-label">Push-Server</div>
          <div class="server-status">Online · ${data.subscriptions} Gerät(e)</div>
        </div>
        <button class="test-btn" id="test-btn">Test senden</button></div>`;
      document.getElementById('test-btn').addEventListener('click', async () => {
        try {
          await fetch(PUSH_API + '/test');
          showToast('Test gesendet! 🔔');
        } catch { showToast('Fehler beim Senden'); }
      });
    } catch {
      area.innerHTML = `<div class="server-card">
        <div class="server-dot offline"></div>
        <div class="server-info">
          <div class="server-label">Push-Server</div>
          <div class="server-status">Offline</div>
        </div></div>`;
    }
  }

  // --- iOS hint ---
  function renderIOSHint() {
    const area = document.getElementById('ios-hint-area');
    if (!isIOS()) return;
    if (!isStandalone()) {
      area.innerHTML = `<div class="ios-hint">
        <strong>📱 iOS: App zum Homescreen hinzufügen</strong>
        Push-Notifications auf iPhone nur als installierte PWA.
        Tippe <b>Teilen</b> → <b>Zum Home-Bildschirm</b>. Mindestens iOS 16.4.</div>`;
    }
  }

  // --- Reminder cards ---
  async function loadAndRenderReminders() {
    let settings;
    try {
      const res = await fetch(PUSH_API + '/settings');
      settings = await res.json();
    } catch (e) {
      document.getElementById('daily-list').innerHTML =
        '<div class="loading" style="color:#e2729a;">Server nicht erreichbar</div>';
      return;
    }

    const dailyList = document.getElementById('daily-list');
    const weeklyList = document.getElementById('weekly-list');
    dailyList.innerHTML = '';
    weeklyList.innerHTML = '';

    for (const [id, r] of Object.entries(settings)) {
      const meta = REMINDER_META[id];
      if (!meta) continue;

      const card = document.createElement('div');
      card.className = 'reminder-card' + (r.enabled ? '' : ' disabled')
        + (r.requireInteraction ? ' sticky-tag' : '');

      let badges = '';
      if (r.requireInteraction) badges += '<span class="badge sticky">bleibt sichtbar</span>';
      if (r.actions && r.actions.length) badges += '<span class="badge action">+ Button</span>';

      card.innerHTML = `
        <div class="reminder-top">
          <div class="reminder-emoji">${meta.emoji}</div>
          <div class="reminder-info">
            <div class="reminder-title">${r.title}</div>
            <div class="reminder-body">${r.body}</div>
            ${badges ? '<div class="reminder-badges">' + badges + '</div>' : ''}
          </div>
          <label class="toggle">
            <input type="checkbox" data-id="${id}" data-action="toggle" ${r.enabled ? 'checked' : ''}>
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="reminder-bottom">
          ${r.day !== null ? '<span class="reminder-day">Freitag</span>' : ''}
          <div class="time-input-wrap">
            <span class="time-label">Uhrzeit:</span>
            <input type="time" class="time-input" data-id="${id}" data-action="time"
              value="${pad(r.hour)}:${pad(r.minute)}">
          </div>
        </div>
      `;

      if (meta.section === 'daily') dailyList.appendChild(card);
      else weeklyList.appendChild(card);
    }

    // Bind events
    document.querySelectorAll('[data-action="toggle"]').forEach(el => {
      el.addEventListener('change', async () => {
        const id = el.dataset.id;
        await updateSetting(id, { enabled: el.checked });
        el.closest('.reminder-card').classList.toggle('disabled', !el.checked);
      });
    });

    document.querySelectorAll('[data-action="time"]').forEach(el => {
      el.addEventListener('change', async () => {
        const id = el.dataset.id;
        const [h, m] = el.value.split(':').map(Number);
        await updateSetting(id, { hour: h, minute: m });
      });
    });
  }

  async function updateSetting(id, changes) {
    try {
      await fetch(PUSH_API + '/settings', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ [id]: changes }),
      });
      showToast('Gespeichert ✓');
    } catch {
      showToast('Fehler beim Speichern');
    }
  }

  // Init
  renderStatus();
  renderServerStatus();
  renderIOSHint();
  loadAndRenderReminders();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
<script src="notifications.js"></script>
</body>
</html>
